services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: llmchat
      POSTGRES_USER: llmchat
      POSTGRES_PASSWORD: llmchat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  headroom:
    build:
      context: .
      dockerfile: Dockerfile.headroom
    ports:
      - "8787:8787"
    environment:
      - HEADROOM_HOST=0.0.0.0

volumes:
  pgdata:
